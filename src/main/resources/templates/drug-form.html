<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Drugs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div class="card shadow">

        <div class="card-header">
            <h3>Drugs Form</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/drugs/save}" th:object="${drug}" method="post"> <!-- Drug Name --> <div class="mb-3"> <label class="form-label"> Drug Name </label> <input type="text" th:field="*{drugName}" class="form-control" placeholder="Enter Drug Name"> </div> <!-- Dosage --> <div class="mb-3"> <label class="form-label"> Dosage </label> <input type="text" th:field="*{dosage}" class="form-control" placeholder="Example: 500 mg"> </div> <!-- Side Effects --> <div class="mb-3"> <label class="form-label"> Side Effects </label> <textarea th:field="*{sideEffects}" class="form-control" rows="4" placeholder="Enter Side Effects"> </textarea> </div> <!-- Manufacturer --> <div class="mb-3"> <label class="form-label"> Manufacturer </label> <input type="text" th:field="*{manufacturer}" class="form-control" placeholder="Enter Manufacturer"> </div> <!-- Disease --> <div class="mb-3"> <label class="form-label"> Disease </label> <select th:field="*{disease.id}" class="form-select"> <option value=""> Select Disease </option> <option th:each="d : ${diseases}" th:value="${d.id}" th:text="${d.diseaseName}"> </option> </select> </div> <button type="submit" class="btn btn-success"> Save Drug </button> <a th:href="@{/drugs}" class="btn btn-secondary"> Back </a> </form>
        </div>

    </div>

</div>

</body>
</html>
