<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Drug Management</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<!-- Sidebar -->

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- Main Content -->

<div class="main-content">

    ```
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>💊 Drug Management</h2>

        <a th:href="@{/drugs/new}"
           class="btn btn-primary">
            Add Drug
        </a>

    </div>

    <!-- Search Form -->
    <form th:action="@{/drugs}" method="get">

        <div class="input-group mb-4">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search Drug by Name">

            <button type="submit"
                    class="btn btn-success">
                Search
            </button>

        </div>

    </form>

    <!-- Drug Table -->
    <table class="table table-bordered table-striped shadow-sm">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Drug Name</th>
            <th>Dosage</th>
            <th>Disease</th>
            <th>Manufacturer</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="drug : ${drugs}">

            <td th:text="${drug.id}"></td>

            <td th:text="${drug.drugName}"></td>

            <td th:text="${drug.dosage}"></td>

            <td th:text="${drug.disease != null ? drug.disease.diseaseName : 'N/A'}"></td>

            <td th:text="${drug.manufacturer}"></td>

            <td>

                <a th:href="@{/drugs/edit/{id}(id=${drug.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/drugs/delete/{id}(id=${drug.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this drug?')">
                    Delete
                </a>

            </td>

        </tr>

        <!-- No Data Found -->
        <tr th:if="${#lists.isEmpty(drugs)}">
            <td colspan="6" class="text-center text-muted">
                No Drugs Available
            </td>
        </tr>

        </tbody>

    </table>
    ```

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
