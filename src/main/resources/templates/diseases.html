<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Disease Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div class="page-card">

        <div class="d-flex justify-content-between mb-3">

            <h2>Disease Management</h2>

            <a th:href="@{/diseases/add}"
               class="btn btn-primary">
                Add Disease
            </a>

        </div>

        <form th:action="@{/diseases}" method="get">

            <div class="input-group mb-3">

                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Search Disease">

                <button type="submit"
                        class="btn btn-success">
                    Search
                </button>

            </div>

        </form>

        <table class="table table-striped table-bordered">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Disease Name</th>
                <th>Symptoms</th>
                <th width="220">Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="d : ${diseases}">

                <td th:text="${d.id}"></td>

                <td th:text="${d.diseaseName}"></td>

                <td th:text="${d.symptom}"></td>

                <td>

                    <a th:href="@{'/diseases/edit/' + ${d.id}}"
                       class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a th:href="@{'/diseases/delete/' + ${d.id}}"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(diseases)}">

                <td colspan="4" class="text-center">
                    No Diseases Found
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
