<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Disease Form</title>

    <!DOCTYPE html>

    <html xmlns:th="http://www.thymeleaf.org">

    <head>
        <title>Disease Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet">

        <link rel="stylesheet" th:href="@{/css/style.css}">

    </head>

    <body>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        ```
        <div class="page-card">

            <h2 class="mb-4">Disease Form</h2>

            <form th:action="@{/diseases/save}"
                  th:object="${disease}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Disease Name</label>
                    <input type="text"
                           th:field="*{diseaseName}"
                           class="form-control"
                           placeholder="Enter Disease Name"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Symptoms</label>
                    <textarea th:field="*{symptom}"
                              class="form-control"
                              rows="3"
                              placeholder="Enter Symptoms"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Causes</label>
                    <textarea th:field="*{causes}"
                              class="form-control"
                              rows="3"
                              placeholder="Enter Causes"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Diagnosis</label>
                    <textarea th:field="*{diagnosis}"
                              class="form-control"
                              rows="3"
                              placeholder="Enter Diagnosis"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Treatment</label>
                    <textarea th:field="*{treatment}"
                              class="form-control"
                              rows="3"
                              placeholder="Enter Treatment"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Prevention</label>
                    <textarea th:field="*{prevention}"
                              class="form-control"
                              rows="3"
                              placeholder="Enter Prevention"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>

                    <select th:field="*{category.id}" class="form-select">

                        <option value="">Select Category</option>

                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>

                    </select>
                </div>

                <div class="mt-4">

                    <button type="submit"
                            class="btn btn-success">
                        Save Disease
                    </button>

                    <a th:href="@{/diseases}"
                       class="btn btn-secondary">
                        Back
                    </a>

                </div>

            </form>

        </div>
        ```

    </div>

    </body>
    </html>
