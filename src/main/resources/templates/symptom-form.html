<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Symptom Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div class="page-card">

        <h2 class="mb-4">Symptom Form</h2>

        <form th:action="@{/symptoms/save}"
              th:object="${symptom}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Symptom Name</label>

                <input type="text"
                       th:field="*{symptomName}"
                       class="form-control"
                       placeholder="Enter Symptom Name"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>

                <textarea th:field="*{description}"
                          class="form-control"
                          rows="4"
                          placeholder="Enter Description">
                </textarea>
            </div>

            <div class="mb-3">

                <label class="form-label">Disease</label>

                <select th:field="*{disease.id}"
                        class="form-select">

                    <option value="">
                        Select Disease
                    </option>

                    <option th:each="d : ${diseases}"
                            th:value="${d.id}"
                            th:text="${d.diseaseName}">
                    </option>

                </select>

            </div>

            <div class="mt-4">

                <button type="submit"
                        class="btn btn-success">
                    Save Symptom
                </button>

                <a th:href="@{/symptoms}"
                   class="btn btn-secondary">
                    Back
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
