<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Symptom Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div class="page-card">

        <div class="d-flex justify-content-between mb-3">

            <h2>Symptom Management</h2>

            <a th:href="@{/symptoms/new}"
               class="btn btn-primary">
                Add Symptom
            </a>

        </div>

        <table class="table table-striped table-bordered">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Symptom Name</th>
                <th>Description</th>
                <th>Disease</th>
                <th width="220">Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="symptom : ${symptoms}">

                <td th:text="${symptom.id}"></td>

                <td th:text="${symptom.symptomName}"></td>

                <td th:text="${symptom.description}"></td>

                <td th:text="${symptom.disease != null ? symptom.disease.diseaseName : 'N/A'}"></td>

                <td>

                    <a th:href="@{'/symptoms/edit/' + ${symptom.id}}"
                       class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a th:href="@{'/symptoms/delete/' + ${symptom.id}}"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(symptoms)}">

                <td colspan="5" class="text-center">
                    No Symptoms Found
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
